        process: gamma
        cv: 3.0
      input_distribution:
        type: gaussian
        params:
            mean: 1024
            std_dev: 128
            min: 512
            max: 1536
      output_distribution:
        type: gaussian
        params:
            mean: 64
            std_dev: 16
            min: 16
            max: 128
      prefix_length: 768
      streaming: false
