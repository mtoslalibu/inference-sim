# Workload 2: Multi-Tenant with Varied Shapes
#
# PURPOSE: 4 tenants, one sends 3x more. Sustained ~1.1 saturation. Tests fairness
# and token-aware shedding. Different request shapes per SLO tier.
#
# PHASES:
#   Ramp-up   (0-20s):  ~6 req/s aggregate
#   Sustained (20-70s): ~11 req/s, cluster at ~1.1 saturation
#   Cool-down (70-90s): ~4 req/s
#
# TIER MIX: critical 15%, standard 30%, sheddable 30%, batch 25%
# TENANTS: A=45% (heavy), B=20%, C=20%, D=15%
# TOKEN LENGTHS: critical=short(128-256), standard/sheddable=medium(256-512), batch=long(1024-2048)
#
# BASELINE WEAKNESS: GAIE legacy ignores tenant ID and token length.
# Sheds all priority<0 equally regardless of who sent it or how expensive it is.
#
# RUN WITH: --num-instances 4 --routing-policy round-robin --snapshot-refresh-interval 50000

version: "2"
seed: 42
category: language
aggregate_rate: 500.0
num_requests: 0
horizon: 90000000  # 90 seconds

clients:
  # === RAMP-UP PHASE (0-20s): ~6 req/s ===
  # 0.6 * 10 = 6 req/s. Split across 4 tenants x 4 tiers = 16 clients.
  # Tenant A gets 45% of each tier's allocation.

  # -- Tenant A (heavy: 45% of traffic) --
  - id: "ramp-A-critical"
    tenant_id: "tenant-A"
    slo_class: "critical"
    rate_fraction: 0.0405   # 0.6 * 0.15 * 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 192, std_dev: 32, min: 128, max: 256}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 0, end_us: 20000000}]}

  - id: "ramp-A-standard"
    tenant_id: "tenant-A"
    slo_class: "standard"
    rate_fraction: 0.081    # 0.6 * 0.30 * 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 384, std_dev: 64, min: 256, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 128, std_dev: 32, min: 16, max: 256}}
    lifecycle: {windows: [{start_us: 0, end_us: 20000000}]}

  - id: "ramp-A-sheddable"
    tenant_id: "tenant-A"
    slo_class: "sheddable"
    rate_fraction: 0.081    # 0.6 * 0.30 * 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 384, std_dev: 64, min: 256, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 128, std_dev: 32, min: 16, max: 256}}
    lifecycle: {windows: [{start_us: 0, end_us: 20000000}]}

  - id: "ramp-A-batch"
    tenant_id: "tenant-A"
    slo_class: "batch"
    rate_fraction: 0.0675   # 0.6 * 0.25 * 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1536, std_dev: 256, min: 1024, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 0, end_us: 20000000}]}

  # -- Tenant B (20% of traffic) --
