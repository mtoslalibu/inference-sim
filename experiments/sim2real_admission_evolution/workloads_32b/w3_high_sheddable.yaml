# Workload 3: High Sheddable Fraction (Qwen3-32B on 4x H100 TP=1)
#
# PURPOSE: 2.5x overload with 65% sheddable traffic. Models production scenarios
# where most traffic is best-effort (chatbot, exploration) and only 30% is protected.
# Tests whether preemptive shedding can dramatically improve protected-class SLO.
#
# TIER MIX: critical 10%, standard 20%, sheddable 65%, batch 5%
# Protected fraction = 30%. After shedding: 0.30 * rate = effective protected load.
#
# 4x H100 with Qwen3-32B TP=1: ~17 req/s capacity
# aggregate_rate=43 → ~2.5x overload
# Protected after shed: 43 * 0.30 = 12.9 req/s → 0.76x capacity (comfortable)
#
# RUN WITH: --model Qwen/Qwen3-32B --hardware H100 --tp 1 --latency-model trained-physics
#           --num-instances 4 --routing-policy round-robin --snapshot-refresh-interval 50000

version: "2"
seed: 42
category: language
aggregate_rate: 75.0
num_requests: 4500
horizon: 60000000  # 60 seconds

clients:
  - id: "critical"
    slo_class: "critical"
    rate_fraction: 0.10
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "standard"
    slo_class: "standard"
    rate_fraction: 0.20
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.65
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "batch"
    slo_class: "batch"
    rate_fraction: 0.05
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
