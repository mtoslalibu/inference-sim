# Workload 3: Oscillating Load
#
# PURPOSE: Repeated oscillation between overload and recovery. Tests hysteresis
# and load trajectory awareness. Baseline flaps between admit-all and reject-all
# every cycle — no smoothing.
#
# PATTERN:
#   Warm-up (0-10s): 4 req/s steady
#   Oscillation (10-80s): [5s at 16 req/s, 5s at 2 req/s] x 7 cycles
#   Cool-down (80-90s): 3 req/s steady
#
# Average load across oscillation ~9 req/s (near 4-instance capacity).
# Uniform request shapes across tiers.
#
# TIER MIX: critical 20%, standard 30%, sheddable 30%, batch 20%
#
# BASELINE WEAKNESS: GAIE legacy has no hysteresis/EMA. It flaps between
# full-admit and full-reject on every 5s cycle. Evolved algo with smoothing
# maintains steady moderate shedding rate = higher sustained goodput.
#
# RUN WITH: --num-instances 4 --routing-policy round-robin --snapshot-refresh-interval 50000

version: "2"
seed: 42
category: language
aggregate_rate: 3000.0
num_requests: 0
horizon: 90000000  # 90 seconds

clients:
  # === WARM-UP (0-10s): 4 req/s ===
  - id: "warmup-critical"
    slo_class: "critical"
    rate_fraction: 0.08     # 0.4 * 0.20
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 0, end_us: 10000000}]}

  - id: "warmup-standard"
    slo_class: "standard"
    rate_fraction: 0.12
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 0, end_us: 10000000}]}

  - id: "warmup-sheddable"
