# FM-8: Short Output at Very High Rate
#
# PURPOSE: FM-5 showed +40.6% E2E mean — our best win. This variant pushes
# the rate higher (80 vs 60) to create more contention. At very high rates,
# the baseline's ppc:2 causes more pile-on because requests arrive faster
# than the queue-depth signal can react, even at 50ms refresh.
#
# MECHANISM: Same as FM-5 (7 prefix groups, short output) but higher rate.
# At rate 80 with 4 instances, each instance sees ~20 req/s on average.
# When ppc:2 routes 3-4 groups to the same instance, it sees 60+ req/s.
# The adaptive router detects this imbalance and disables cache.

version: "2"
seed: 42
category: language
aggregate_rate: 80.0
num_requests: 2000

cohorts:
  - id: "prefix-group-1"
    population: 1
    rate_fraction: 0.143
    slo_class: "standard"
    streaming: true
    arrival:
      process: poisson
    prefix_group: "doc-collection-1"
    prefix_length: 16384
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 8
        std_dev: 4
        min: 1
        max: 16

