# FM-3: Burst Absorption Under Stale Signals
#
# PURPOSE: Sudden traffic spike where stale signals mislead the prefix scorer.
# During the burst, all requests share a prefix. The ppc:2 weight drives them
# all to the cached instance. InFlightRequests (synchronous) should help via
# qd:1, but it's outweighed 2:1 by the prefix score.
#
# MECHANISM: Moderate steady-state rate, then a 10x burst of prefix-sharing
# requests. The burst cohort uses gamma CV=8 (extremely bursty) to create
# spike behavior. During the spike:
#   - Cache signal (2s stale) points to one instance
#   - Queue-depth signal (5s stale) still shows pre-burst state
#   - ppc:2 overrides qd:1 -> pile-on
#
# EXPECTED: 2:1:1 shows P99 spike during bursts. Pure load-balance absorbs
# bursts by spreading instantly via InFlightRequests.
#
# RUN WITH: --num-instances 4

version: "2"
seed: 42
category: language
aggregate_rate: 8.0
num_requests: 1000

clients:
  # Steady baseline: 30% of traffic, no prefix, smooth arrivals
  - id: "steady-baseline"
    slo_class: "standard"
    rate_fraction: 0.30
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128

  # Bursty prefix traffic: 50% of traffic, extreme burstiness (CV=8)
  # All share one prefix, so during bursts they all want the same instance
  - id: "burst-prefix"
    slo_class: "standard"
    rate_fraction: 0.50
    streaming: true
    arrival:
      process: gamma
      cv: 8.0
    prefix_group: "burst-system-prompt"
    prefix_length: 16384
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128

  # Secondary steady prefix: 20%, different prefix, smooth
  - id: "steady-prefix"
    slo_class: "standard"
    rate_fraction: 0.20
    streaming: true
    arrival:
      process: poisson
    prefix_group: "secondary-system-prompt"
    prefix_length: 16384
    input_distribution:
      type: gaussian
      params:
        mean: 128
        std_dev: 32
        min: 32
        max: 256
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128
