# Oracle: Adaptive Cache-Aware Load Balancing (Adaptive-CLB)
#
# Requires: adaptive_cache_lb.go swapped into sim/routing.go
#
# The Route() method bypasses the scorer pipeline entirely. Instead:
#   Stage 1: Cache triage — queries precise KV cache state via cacheFn,
#            filters to instances within 50% of best cache hit count
#   Stage 2: Load balance — picks lowest EffectiveLoad() among eligible
#
# The scorers below exist to ensure cacheFn is wired through the constructor.
# precise-prefix-cache triggers cache query function availability.
# The scorer pipeline itself is NOT invoked by Route().
#
# Signals accessed (directly, not via scorers):
#   - cacheFn[instanceID](inputTokens) → cached block count (via precise-prefix-cache wiring)
#   - EffectiveLoad() = QueueDepth + BatchSize + InFlightRequests (synchronous)

admission:
  policy: always-admit

routing:
  policy: weighted
  scorers:
    - name: precise-prefix-cache
      weight: 2.0
    - name: queue-depth
      weight: 1.0

priority:
  policy: constant

scheduler: fcfs
