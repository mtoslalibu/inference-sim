# FM-4: Multi-Regime / Phased Workload
#
# PURPOSE: Workload shifts between distinct phases that need different routing
# strategies. Static 2:1:1 is a compromise suboptimal for every phase.
#
# DESIGN: 4 phases modeled via cohort lifecycle windows:
#
#   Phase 1 (0-25s): Prefix-heavy — 80% traffic from one prefix group.
#     Optimal: strong cache affinity. 2:1:1 may pile on (FM-1 dynamics).
#
#   Phase 2 (25-50s): Cold — all traffic is unique, no prefix sharing.
#     Optimal: pure load-balance. 2:1:1 wastes scorer budget on ppc (returns 0).
#
#   Phase 3 (50-75s): Mixed — 3 prefix groups + cold traffic.
#     Optimal: moderate cache awareness with load-balance. 2:1:1 may be OK here.
#
#   Phase 4 (75-100s): Different dominant prefix — new prefix group takes over.
#     Optimal: cache affinity to new group. 2:1:1 may chase stale cache from
#     phase 1 prefix during transition.
#
# EXPECTED: 2:1:1 underperforms in phases 1 (pile-on), 2 (wasted ppc weight),
# and the phase 3->4 transition (stale cache chasing). Pure load-balance is
# regime-agnostic and should win on phases 2 and during transitions.
#
# RUN WITH: --num-instances 4

version: "2"
seed: 42
category: language
aggregate_rate: 8.0
num_requests: 0
horizon: 200000000  # 200 seconds (longer to let phases play out)

clients:
  # Phase 1 (0-25s): Dominant prefix group
  - id: "phase1-dominant"
    slo_class: "standard"
    rate_fraction: 0.30
    streaming: true
    arrival:
      process: gamma
      cv: 2.0
    prefix_group: "phase1-system-prompt"
    prefix_length: 16384
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128
    lifecycle:
      windows:
        - start_us: 0
          end_us: 50000000

  # Phase 2 (50-100s): Cold traffic, no prefix
  - id: "phase2-cold"
    slo_class: "standard"
    rate_fraction: 0.25
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 128
        min: 32
        max: 1024
    output_distribution:
      type: gaussian
      params:
        mean: 128
        std_dev: 64
        min: 16
        max: 512
    lifecycle:
      windows:
        - start_us: 50000000
          end_us: 100000000

  # Phase 3 (100-150s): Mixed — 3 prefix groups
  - id: "phase3-mix-a"
    slo_class: "standard"
    rate_fraction: 0.05
    streaming: true
    arrival:
      process: poisson
    prefix_group: "mix-group-a"
    prefix_length: 8192
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128
    lifecycle:
      windows:
        - start_us: 100000000
          end_us: 150000000

  - id: "phase3-mix-b"
    slo_class: "standard"
    rate_fraction: 0.05
    streaming: true
    arrival:
      process: poisson
    prefix_group: "mix-group-b"
    prefix_length: 8192
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128
    lifecycle:
      windows:
        - start_us: 100000000
          end_us: 150000000

  - id: "phase3-mix-c"
    slo_class: "standard"
    rate_fraction: 0.05
    streaming: true
    arrival:
      process: poisson
    prefix_group: "mix-group-c"
    prefix_length: 8192
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128
    lifecycle:
      windows:
        - start_us: 100000000
          end_us: 150000000

  - id: "phase3-cold"
    slo_class: "standard"
    rate_fraction: 0.05
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128
    lifecycle:
      windows:
        - start_us: 100000000
          end_us: 150000000

  # Phase 4 (150-200s): New dominant prefix (different from phase 1)
  - id: "phase4-new-dominant"
    slo_class: "standard"
    rate_fraction: 0.25
    streaming: true
    arrival:
      process: gamma
      cv: 2.0
    prefix_group: "phase4-new-system-prompt"
    prefix_length: 16384
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 64
        std_dev: 16
        min: 8
        max: 128
    lifecycle:
      windows:
        - start_us: 150000000
          end_us: 200000000
