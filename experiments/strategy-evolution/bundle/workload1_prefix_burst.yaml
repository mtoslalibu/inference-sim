version: "2"
seed: 0
category: language
clients:
    - id: doc-search-A
      prefix_group: "doc-A"
      slo_class: ""
      rate_fraction: 0.35
      arrival:
        process: gamma
        cv: 2.0
      input_distribution:
        type: gaussian
        params:
            mean: 768
            std_dev: 128
            min: 384
            max: 1536
      output_distribution:
        type: gaussian
        params:
            mean: 128
            std_dev: 32
            min: 16
            max: 256
      prefix_length: 384
      streaming: false
    - id: doc-search-B
      prefix_group: "doc-B"
      slo_class: ""
      rate_fraction: 0.35
      arrival:
        process: gamma
        cv: 2.0
      input_distribution:
        type: gaussian
        params:
            mean: 768
            std_dev: 128
            min: 384
            max: 1536
      output_distribution:
        type: gaussian
        params:
            mean: 128
            std_dev: 32
            min: 16
            max: 256
      prefix_length: 384
      streaming: false
    - id: cold-queries
      slo_class: ""
      rate_fraction: 0.3
      arrival:
        process: poisson
      input_distribution:
        type: gaussian
        params:
            mean: 256
            std_dev: 64
            min: 64
            max: 512
      output_distribution:
        type: gaussian
        params:
            mean: 64
            std_dev: 16
            min: 16
            max: 128
