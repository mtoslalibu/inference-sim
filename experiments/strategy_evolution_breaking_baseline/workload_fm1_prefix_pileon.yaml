# FM-1: Prefix Pile-On — Dominant Prefix Group
#
# PURPOSE: One prefix group gets 75% of all traffic. The ppc:2 weight should
# route nearly all of it to the same instance, overwhelming qd:1 counterbalance.
#
# MECHANISM: With min-max normalization, the instance that cached the dominant
# prefix scores 1.0 on ppc (weight 2) while others score 0.0. Queue-depth at
# weight 1 cannot overcome the 2x prefix advantage. By the time the 5s-stale
# queue signal reflects the pile-on, thousands of requests are already routed.
#
# EXPECTED: 2:1:1 creates severe load imbalance. One instance saturates while
# others idle. Pure load-balance (qd:1) distributes evenly.
#
# RUN WITH: --num-instances 4 (and 8)

version: "2"
seed: 42
category: language
aggregate_rate: 8.0
num_requests: 1000

clients:
  # Dominant prefix group: 75% of traffic, one shared system prompt
  - id: "dominant-prefix"
    slo_class: "standard"
    rate_fraction: 0.75
    streaming: true
    arrival:
      process: gamma
      cv: 3.0
    prefix_group: "system-prompt-main"
    prefix_length: 16384
    input_distribution:
      type: gaussian
      params:
        mean: 512
        std_dev: 128
        min: 128
        max: 1024
    output_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 32
        max: 512

  # Cold traffic: 25%, no prefix sharing
  - id: "cold-traffic"
    slo_class: "standard"
    rate_fraction: 0.25
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 512
        std_dev: 256
        min: 64
        max: 2048
    output_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 128
        min: 32
        max: 512
