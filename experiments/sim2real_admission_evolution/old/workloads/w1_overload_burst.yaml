# Workload 1: Overload Burst
#
# PURPOSE: Steady traffic -> 5x burst -> recovery. Tests graceful degradation.
# Uniform request shapes across tiers.
#
# NOTE ON BATCH: In BLIS, batch/background requests are intercepted by the deferred
# queue BEFORE admission is called (cluster_event.go:141). They bypass admission
# entirely. So the admission fight is critical vs standard vs sheddable.
# We use a small batch fraction for realism but sheddable is the main shed target.
#
# TIER MIX: critical 25%, standard 35%, sheddable 35%, batch 5%
# (batch small since it's deferred, not admitted/rejected)
#
# Rate scaling: aggregate_rate * (phase_fraction / total_fraction_sum) = phase rate
# Total fraction sum across all clients: warmup(0.35) + ramp(0.70) + burst(1.75) + recovery(0.35) = 3.15
# aggregate_rate = 500 → effective rates: warmup=56, ramp=111, burst=278, recovery=56 req/s
#
# RUN WITH: --num-instances 4 --routing-policy round-robin --snapshot-refresh-interval 50000

version: "2"
seed: 42
category: language
aggregate_rate: 500.0
num_requests: 0
horizon: 90000000  # 90 seconds

clients:
  # === WARM-UP (0-15s) ===
  - id: "warmup-critical"
    slo_class: "critical"
    rate_fraction: 0.0875
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 0, end_us: 15000000}]}

  - id: "warmup-standard"
    slo_class: "standard"
    rate_fraction: 0.1225
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 0, end_us: 15000000}]}

  - id: "warmup-sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.1225
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 0, end_us: 15000000}]}

  - id: "warmup-batch"
    slo_class: "batch"
    rate_fraction: 0.0175
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 0, end_us: 15000000}]}

  # === RAMP (15-25s) ===
  - id: "ramp-critical"
    slo_class: "critical"
    rate_fraction: 0.175
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 15000000, end_us: 25000000}]}

  - id: "ramp-standard"
    slo_class: "standard"
    rate_fraction: 0.245
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 15000000, end_us: 25000000}]}

  - id: "ramp-sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.245
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 15000000, end_us: 25000000}]}

  - id: "ramp-batch"
    slo_class: "batch"
    rate_fraction: 0.035
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 15000000, end_us: 25000000}]}

  # === BURST (25-55s): 5x, gamma CV=6, larger requests ===
  - id: "burst-critical"
    slo_class: "critical"
    rate_fraction: 0.4375
    streaming: true
    arrival: {process: gamma, cv: 6.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    lifecycle: {windows: [{start_us: 25000000, end_us: 55000000}]}

  - id: "burst-standard"
    slo_class: "standard"
    rate_fraction: 0.6125
    streaming: true
    arrival: {process: gamma, cv: 6.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    lifecycle: {windows: [{start_us: 25000000, end_us: 55000000}]}

  - id: "burst-sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.6125
    streaming: true
    arrival: {process: gamma, cv: 6.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    lifecycle: {windows: [{start_us: 25000000, end_us: 55000000}]}

  - id: "burst-batch"
    slo_class: "batch"
    rate_fraction: 0.0875
    streaming: true
    arrival: {process: gamma, cv: 6.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    lifecycle: {windows: [{start_us: 25000000, end_us: 55000000}]}

  # === RECOVERY (55-90s) ===
  - id: "recovery-critical"
    slo_class: "critical"
    rate_fraction: 0.0875
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 55000000, end_us: 90000000}]}

  - id: "recovery-standard"
    slo_class: "standard"
    rate_fraction: 0.1225
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 55000000, end_us: 90000000}]}

  - id: "recovery-sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.1225
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 55000000, end_us: 90000000}]}

  - id: "recovery-batch"
    slo_class: "batch"
    rate_fraction: 0.0175
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 64, max: 512}}
    output_distribution: {type: gaussian, params: {mean: 64, std_dev: 16, min: 8, max: 128}}
    lifecycle: {windows: [{start_us: 55000000, end_us: 90000000}]}
