# W1: Sustained Overload — Qwen3-14B trained-physics on 4x H100 TP=1
#
# Capacity: ~73 req/s. Rate=110 → 1.5x overload.
# Tier mix: critical 20%, standard 30%, sheddable 45%, batch 5%
# After shed: 0.55 * 110 = 60.5 req/s → 0.83x capacity

version: "2"
seed: 42
category: language
aggregate_rate: 110.0
num_requests: 6600
horizon: 60000000

clients:
  - id: "critical"
    slo_class: "critical"
    rate_fraction: 0.20
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
  - id: "standard"
    slo_class: "standard"
    rate_fraction: 0.30
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
  - id: "sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
  - id: "batch"
    slo_class: "batch"
    rate_fraction: 0.05
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
