# Workload 1: Sustained Moderate Overload (Qwen3-32B on 4x H100 TP=1)
#
# PURPOSE: Steady 1.5x overload for 60s. Tests whether early shedding of sheddable
# reduces critical/standard latency enough to improve SLO attainment.
#
# TIER MIX: critical 20%, standard 30%, sheddable 45%, batch 5%
# With sheddable shed: effective load drops to 0.55 * 1.5x = 0.825x capacity (manageable)
#
# 4x H100 with Qwen3-32B TP=1 trained-physics: ~17 req/s capacity (4.25/instance)
# aggregate_rate=30 → ~1.8x overload
# With sheddable shed: 30 * 0.55 = 16.5 req/s → ~0.97x capacity (manageable)
#
# RUN WITH: --model Qwen/Qwen3-32B --hardware H100 --tp 1 --latency-model trained-physics
#           --num-instances 4 --routing-policy round-robin --snapshot-refresh-interval 50000

version: "2"
seed: 42
category: language
aggregate_rate: 30.0
num_requests: 1800

clients:
  - id: "critical"
    slo_class: "critical"
    rate_fraction: 0.20
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "standard"
    slo_class: "standard"
    rate_fraction: 0.30
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "batch"
    slo_class: "batch"
    rate_fraction: 0.05
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
