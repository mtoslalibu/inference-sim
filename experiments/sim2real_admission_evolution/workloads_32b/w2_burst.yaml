# Workload 2: Burst Pattern (Qwen3-32B on 4x H100 TP=1)
#
# PURPOSE: 30s at 1x capacity, then 30s at 2x. Tests reactive shedding during burst.
#
# TIER MIX: critical 20%, standard 30%, sheddable 45%, batch 5%
# At 2x burst with sheddable shed: 0.55 * 2x = 1.1x (mild remaining overload)
#
# Phase 1 (0-30s): fractions sum to 1.0 → aggregate_rate * 1.0/3.0 = 17 req/s (1x capacity)
# Phase 2 (30-60s): fractions sum to 2.0 → aggregate_rate * 2.0/3.0 = 34 req/s (2x capacity)
# Total fraction sum = 3.0, so aggregate_rate = 51
#
# RUN WITH: --model Qwen/Qwen3-32B --hardware H100 --tp 1 --latency-model trained-physics
#           --num-instances 4 --routing-policy round-robin --snapshot-refresh-interval 50000

version: "2"
seed: 42
category: language
aggregate_rate: 51.0
num_requests: 3060
horizon: 60000000  # 60 seconds

clients:
  # === STEADY PHASE (0-30s): 1x capacity ===
  - id: "steady-critical"
    slo_class: "critical"
    rate_fraction: 0.20
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 0, end_us: 30000000}]}

  - id: "steady-standard"
    slo_class: "standard"
    rate_fraction: 0.30
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 0, end_us: 30000000}]}

  - id: "steady-sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 0, end_us: 30000000}]}

  - id: "steady-batch"
    slo_class: "batch"
    rate_fraction: 0.05
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 0, end_us: 30000000}]}

  # === BURST PHASE (30-60s): 2x capacity ===
  - id: "burst-critical"
    slo_class: "critical"
    rate_fraction: 0.40
    streaming: true
    arrival: {process: gamma, cv: 3.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 30000000, end_us: 60000000}]}

  - id: "burst-standard"
    slo_class: "standard"
    rate_fraction: 0.60
    streaming: true
    arrival: {process: gamma, cv: 3.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 30000000, end_us: 60000000}]}

  - id: "burst-sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.90
    streaming: true
    arrival: {process: gamma, cv: 3.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 30000000, end_us: 60000000}]}

  - id: "burst-batch"
    slo_class: "batch"
    rate_fraction: 0.10
    streaming: true
    arrival: {process: gamma, cv: 3.0}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
    lifecycle: {windows: [{start_us: 30000000, end_us: 60000000}]}
