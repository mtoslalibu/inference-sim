# FM-6: Cold Traffic Under KV Memory Pressure
#
# PURPOSE: All cold traffic (no prefix sharing), high rate, pushing KV cache
# toward full. Tests whether kv-utilization scoring helps prevent preemptions
# when there's no cache affinity to exploit.
#
# DESIGN: 100% cold traffic with large input+output tokens to consume KV blocks.
# No prefix groups at all — ppc scores equalize to neutral. High rate creates
# concurrent requests that compete for limited KV blocks (3,909 on Qwen3-32B).
#
# EXPECTED: Without kvu, the router is blind to memory pressure and may pile
# requests on nearly-full instances, causing preemptions. With kvu (regime 2
# of adaptive), routing avoids KV-exhausted instances. Baseline 2:1:1 should
# also benefit from kvu here since ppc scores are neutral.
#
# RUN WITH: --num-instances 4

version: "2"
seed: 42
category: language
aggregate_rate: 10.0
num_requests: 1000

clients:
  # All cold traffic — no prefix sharing
  - id: "cold-large"
    slo_class: "standard"
    rate_fraction: 0.60
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: gaussian
      params:
        mean: 1024
        std_dev: 512
        min: 128
        max: 4096
    output_distribution:
      type: gaussian
      params:
        mean: 512
        std_dev: 256
        min: 64
        max: 2048

  - id: "cold-medium"
    slo_class: "standard"
    rate_fraction: 0.40
    streaming: true
    arrival:
      process: gamma
      cv: 2.0
    input_distribution:
      type: gaussian
      params:
        mean: 512
        std_dev: 256
        min: 64
        max: 2048
    output_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 128
        min: 32
        max: 1024
