# FM-5: Short Output + Many Prefix Groups (Classification/Extraction Workload)
#
# PURPOSE: When output tokens are very short (8-16), E2E is dominated by TTFT.
# The kvu anti-affinity mechanism that hurts TTFT should now show up in E2E.
#
# DESIGN: Same as FM-2a (7 prefix groups across 4 instances, 16384-token prefixes)
# but with very short output tokens (mean=8). This models classification,
# extraction, yes/no, or routing-decision workloads — common production patterns.
#
# EXPECTED: TTFT wins from FM-2a (~50%) should translate directly to E2E wins
# since E2E ≈ TTFT + (8 tokens * ~26ms ITL) ≈ TTFT + 200ms.
#
# RUN WITH: --num-instances 4

version: "2"
seed: 42
category: language
aggregate_rate: 60.0
num_requests: 2000

cohorts:
  - id: "prefix-group-1"
    population: 1
    rate_fraction: 0.143
    slo_class: "standard"
    streaming: true
    arrival:
      process: poisson
    prefix_group: "doc-collection-1"
    prefix_length: 16384
    input_distribution:
      type: gaussian
      params:
        mean: 256
        std_dev: 64
        min: 64
        max: 512
    output_distribution:
      type: gaussian
      params:
        mean: 8
        std_dev: 4
        min: 1
        max: 16

