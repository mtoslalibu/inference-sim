version: "2"
seed: 0
category: language
clients:
    - id: tiny-requests
      tenant_id: ""
      slo_class: ""
      rate_fraction: 0.7
      arrival:
        process: poisson
      input_distribution:
        type: gaussian
        params:
            mean: 64
            std_dev: 16
            min: 32
            max: 128
      output_distribution:
        type: gaussian
        params:
            mean: 32
            std_dev: 8
            min: 8
            max: 64
      streaming: false
    - id: huge-requests
      tenant_id: ""
      slo_class: ""
      rate_fraction: 0.3
      arrival:
        process: poisson
      input_distribution:
        type: gaussian
        params:
            mean: 2048
            std_dev: 512
            min: 1024
            max: 4096
      output_distribution:
        type: gaussian
        params:
            mean: 512
            std_dev: 128
            min: 128
            max: 1024
      streaming: false
aggregate_rate: 100
num_requests: 6000
