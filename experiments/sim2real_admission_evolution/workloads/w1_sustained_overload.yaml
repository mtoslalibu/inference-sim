# Workload 1: Sustained Moderate Overload
#
# PURPOSE: Steady 1.5x overload for 60s. Tests whether early shedding of sheddable
# reduces critical/standard latency enough to improve SLO attainment.
#
# TIER MIX: critical 20%, standard 30%, sheddable 45%, batch 5%
# With sheddable shed: effective load drops to 0.55 * 1.5x = 0.825x capacity (manageable)
#
# 4x H100 with qwen3-14b at 1024in/256out: ~50 req/s capacity (12.5/instance)
# aggregate_rate=80 → 1.6x overload
# With sheddable shed: 80 * 0.55 = 44 req/s → ~0.88x capacity (manageable)
#
# RUN WITH: --num-instances 4 --routing-policy round-robin --snapshot-refresh-interval 50000

version: "2"
seed: 42
category: language
aggregate_rate: 80.0
num_requests: 4800
horizon: 60000000  # 60 seconds

clients:
  - id: "critical"
    slo_class: "critical"
    rate_fraction: 0.20
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "standard"
    slo_class: "standard"
    rate_fraction: 0.30
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "sheddable"
    slo_class: "sheddable"
    rate_fraction: 0.45
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}

  - id: "batch"
    slo_class: "batch"
    rate_fraction: 0.05
    streaming: true
    arrival: {process: poisson}
    input_distribution: {type: gaussian, params: {mean: 1024, std_dev: 256, min: 256, max: 2048}}
    output_distribution: {type: gaussian, params: {mean: 256, std_dev: 64, min: 32, max: 512}}
