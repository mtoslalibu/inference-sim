version: "2"
seed: 0
category: language
clients:
    - id: short-queries
      prefix_group: "sys-prompt"
      slo_class: ""
      rate_fraction: 0.7
      arrival:
        process: gamma
        cv: 2.0
      input_distribution:
        type: gaussian
        params:
            mean: 128
            std_dev: 32
            min: 32
            max: 256
      output_distribution:
        type: gaussian
        params:
            mean: 32
            std_dev: 8
            min: 8
            max: 64
      prefix_length: 64
      streaming: false
    - id: long-analysis
      prefix_group: "analysis-ctx"
      slo_class: ""
      rate_fraction: 0.3
      arrival:
        process: gamma
        cv: 3.0
      input_distribution:
        type: gaussian
        params:
            mean: 2048
            std_dev: 512
            min: 1024
            max: 4096
      output_distribution:
        type: gaussian
        params:
            mean: 256
            std_dev: 64
            min: 32
            max: 512
      prefix_length: 512
      streaming: false
aggregate_rate: 80
num_requests: 5000
